# OpenMemory Embedding Models Configuration
# Configure which models to use for each memory facet and provider
# Provider settings (URLs, API keys, etc.) are in .env

# Facet-specific model mappings
# Each facet can use different models optimized for that type of memory

episodic:
  ollama: nomic-embed-text
  openai: text-embedding-3-small
  gemini: models/gemini-embedding-001
  aws: amazon.titan-embed-text-v2:0
  siray: openai/text-embedding-3-small
  local: all-MiniLM-L6-v2

