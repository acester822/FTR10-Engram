services:
  # ── PostgreSQL (primary memory storage) ──────────────────────────────
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OM_PG_DB:-openmemory}
      POSTGRES_USER: ${OM_PG_USER:-postgres}
      POSTGRES_PASSWORD: ${OM_PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ftr10-codecortex

  # ── Redis (optional cache / valkey storage) ──────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ftr10-codecortex

  # ── Ollama (local LLM engine) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: codecortex-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # Pin all models indefinitely — never unload from RAM/VRAM
      - OLLAMA_KEEP_ALIVE=-1
    networks:
      - ftr10-codecortex
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── CodeCortex Server ────────────────────────────────────────────────
  openmemory:
    build:
      context: ./packages/openmemory-js
      dockerfile: Dockerfile
    ports:
      - "8098:8080"
    environment:
      OM_PORT: ${OM_PORT:-8080}

      # PostgreSQL (primary storage)
      OM_PG_HOST: postgres
      OM_PG_PORT: 5432
      OM_PG_DB: ${OM_PG_DB:-openmemory}
      OM_PG_USER: ${OM_PG_USER:-postgres}
      OM_PG_PASSWORD: ${OM_PG_PASSWORD:-postgres}
      OM_PG_SCHEMA: ${OM_PG_SCHEMA:-public}
      OM_PG_SSL: disable

      # Storage backend (postgres, sqlite, valkey/redis)
      OM_STORAGE: postgres
      OM_SQLITE_PATH: /data/openmemory.sqlite

      # Embedding provider & model overrides
      OM_EMBEDDINGS: ollama
      OM_EMBEDDING_FALLBACK: ollama
      OM_VEC_DIM: ${OM_VEC_DIM:-1536}

      # Vector store (postgres, qdrant, pinecone, weaviate, chroma, milvus)
      OM_VECTOR_STORE: postgres
      OM_VECTOR_COLLECTION: openmemory_memories

      # Ollama (local embeddings & LLM)
      OLLAMA_URL: http://ollama:11434
      OM_OLLAMA_URL: http://ollama:11434

      # Embedding model overrides
      OM_OPENAI_MODEL: ${OM_OPENAI_MODEL:-text-embedding-3-small}
      OM_GEMINI_MODEL: ${OM_GEMINI_MODEL:-models/gemini-embedding-001}
      OM_OLLAMA_MODEL: bge-m3

      # LLM for consolidation / extraction (only qwen2.5:7b)
      LLAMA_URL: http://10.10.10.41:8080/v1
      OM_LLM_URL: http://10.10.10.41:8080/v1
      CONSOLIDATION_MODEL: qwen2.5:7b
      EXTRACTION_MODEL: qwen2.5:7b

      # Auth & telemetry
      OM_API_KEY: ${OM_API_KEY:-}
      OM_REQUIRE_API_KEY: ${OM_REQUIRE_API_KEY:-false}
      OM_LOG_AUTH: ${OM_LOG_AUTH:-false}
      OM_TELEMETRY: ${OM_TELEMETRY:-true}

      # Server limits
      OM_MAX_PAYLOAD_SIZE: ${OM_MAX_PAYLOAD_SIZE:-1000000}
      OM_RATE_LIMIT_ENABLED: ${OM_RATE_LIMIT_ENABLED:-false}
      OM_RATE_LIMIT_WINDOW_MS: ${OM_RATE_LIMIT_WINDOW_MS:-60000}
      OM_RATE_LIMIT_MAX_REQUESTS: ${OM_RATE_LIMIT_MAX_REQUESTS:-100}

    volumes:
      - server_data:/data
    networks:
      - ftr10-codecortex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be reachable...' &&
        while ! node -e \"fetch('http://ollama:11434/api/version').catch(()=>process.exit(1))\" 2>/dev/null; do sleep 1; done &&
        echo 'Ollama is ready.' &&
        echo 'Pulling qwen2.5:7b...' &&
        node -e \"fetch('http://ollama:11434/api/pull',{method:'POST',body:JSON.stringify({name:'qwen2.5:7b',stream:false})}).catch(()=>{})\" 2>/dev/null || true &&
        echo 'Pulling bge-m3...' &&
        node -e \"fetch('http://ollama:11434/api/pull',{method:'POST',body:JSON.stringify({name:'bge-m3',stream:false})}).catch(()=>{})\" 2>/dev/null || true &&
        echo 'Starting CodeCortex proxy...' &&
        npm run start
      "
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Web GUI ──────────────────────────────────────────────────────────
  ui:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_OM_API_URL: http://openmemory:8080
    ports:
      - "8099:80"
    depends_on:
      openmemory:
        condition: service_healthy
    networks:
      - ftr10-codecortex
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  server_data:
  ollama_data:

networks:
  ftr10-codecortex:
    driver: bridge
