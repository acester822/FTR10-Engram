services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EG_PG_DB:-engram}
      POSTGRES_USER: ${EG_PG_USER:-postgres}
      POSTGRES_PASSWORD: ${EG_PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ftr10-engram

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ftr10-engram

  ollama:
    image: ollama/ollama:latest
    container_name: engram-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NUM_PARALLEL: 1
    networks:
      - ftr10-engram
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  model-loader:
    image: node:20-alpine
    restart: "no"
    volumes:
      - ./scripts:/scripts:ro
    environment:
      OLLAMA_URL: http://ollama:11434
      HOT_MODEL: qwen3.5:2b
    networks:
      - ftr10-engram
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/load-models.sh"]

  engram:
    build:
      context: ./packages/engram-js
      dockerfile: Dockerfile
    ports:
      - "8098:8080"
    env_file:
      - .env
    environment:
      EG_PG_HOST: postgres
      EG_OLLAMA_URL: http://ollama:11434
    volumes:
      - server_data:/data
    networks:
      - ftr10-engram
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
      model-loader:
        condition: service_completed_successfully
    restart: unless-stopped
    command: ["npm", "run", "start"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_OM_API_URL: http://engram:8080
    ports:
      - "8099:80"
    depends_on:
      engram:
        condition: service_healthy
    networks:
      - ftr10-engram
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  server_data:

networks:
  ftr10-engram:
    driver: bridge