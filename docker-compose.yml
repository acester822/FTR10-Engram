services:
  # ── Shared infrastructure ──
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EG_PG_USER:-postgres}
      POSTGRES_PASSWORD: ${EG_PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ftr10-engram

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    networks:
      - ftr10-engram

  # ── Engram core ──
  engram:
    build:
      context: ./packages/engram-js
      dockerfile: Dockerfile
    ports:
      - "8098:8080"
    env_file:
      - .env
    environment:
      EG_PG_HOST: postgres
      EG_REDIS_URL: redis://redis:6379
      EG_EMBEDDINGS: "openai"
      EG_OPENAI_BASE_URL: "${REMOTE_LLM_URL}/v1"
      EG_OPENAI_API_KEY: "${REMOTE_LLM_API_KEY}"
      EG_OPENAI_MODEL: "Nomic-Embed-Text-v1.5"
      EG_GENERATIVE_URL: "${REMOTE_LLM_URL}/v1"
      EG_GENERATIVE_MODEL: "${REMOTE_LLM_MODEL}"
      EG_UPSTREAM_LLM_URL: "${REMOTE_LLM_URL}/v1"
      EG_INTERNAL_API_KEY: "${EG_INTERNAL_API_KEY}"
      TZ: America/Chicago
    volumes:
      - server_data:/data
      - ./logs:/home/ftr/Apps/Engram/logs
    networks:
      - ftr10-engram
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["npm", "run", "start"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Auto-search (searxNcrawl) ──
  searxncrawl:
    build:
      context: ./apps/searxNcrawl
      dockerfile: Dockerfile
    image: engram-searxncrawl:latest
    env_file:
      - ./apps/searxNcrawl/.env
    environment:
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      MCP_PORT: 9555
    ports:
      - "9555:9555"
    command:
      - python
      - -m
      - crawler.mcp_server
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "9555"
    networks:
      - ftr10-engram
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./apps/searxNcrawl/searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: https://${SEARXNG_HOSTNAME:-localhost}/
    ports:
      - "8888:8080"
    networks:
      - ftr10-engram
    restart: unless-stopped

  # ── Engram Web GUI (React/Vite SPA, served by nginx, proxies /api -> engram) ──
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: proxy
    ports:
      - "8099:80"
    depends_on:
      engram:
        condition: service_healthy
    networks:
      - ftr10-engram
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
  server_data:

networks:
  ftr10-engram:
    driver: bridge